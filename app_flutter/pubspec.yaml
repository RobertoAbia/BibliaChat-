name: biblia_chat
description: "App cristiana para hispanohablantes - Tu fe, tu idioma, tu cultura."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependency_overrides:
  app_links: ^7.0.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Supabase (Auth + Database + Storage)
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  package_info_plus: ^8.1.2
  device_info_plus: ^11.2.0
  connectivity_plus: ^6.1.1
  path_provider: ^2.1.2

  # Image sharing
  screenshot: ^3.0.0
  image_picker: ^1.0.7
  google_fonts: ^6.1.0

  # Payments (RevenueCat)
  purchases_flutter: ^8.3.1

  # Firebase (Analytics + Notifications)
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  firebase_analytics: ^11.3.6

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  flutter_timezone: ^4.1.1
  equatable: ^2.0.7
  gal: ^2.3.2

  # App Store review
  in_app_review: ^2.0.9
  back_button_interceptor: ^8.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation (Riverpod)
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
