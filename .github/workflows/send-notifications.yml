  name: Send Push Notifications                                                                                                                                                                                                                                                                                         
  on:
    schedule:
      - cron: '29 * * * *'
    workflow_dispatch:
      inputs:
        notification_type:
          description: 'Type of notification to send'
          required: false
          type: choice
          options:
            - all
            - stories_missed
            - daily_reminder
            - plan_abandoned
            - streak_lost

  env:
    SUPABASE_URL: https://popqvhrgsokuviwtscid.supabase.co

  jobs:
    send-notifications:
      runs-on: ubuntu-latest
      steps:
        - name: Send Daily Reminder
          if: github.event_name == 'schedule' || github.event.inputs.notification_type == 'all' || github.event.inputs.notification_type == 'daily_reminder'
          continue-on-error: true
          run: |
            echo "Sending daily_reminder..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              '${{ env.SUPABASE_URL }}/functions/v1/send-daily-reminders' \
              -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
              -H 'Content-Type: application/json' \
              -d '{"type": "daily_reminder"}')
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            echo "Response: $body (HTTP $http_code)"

        - name: Send Stories Missed
          if: github.event_name == 'schedule' || github.event.inputs.notification_type == 'all' || github.event.inputs.notification_type == 'stories_missed'
          continue-on-error: true
          run: |
            echo "Sending stories_missed..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              '${{ env.SUPABASE_URL }}/functions/v1/send-daily-reminders' \
              -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
              -H 'Content-Type: application/json' \
              -d '{"type": "stories_missed"}')
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            echo "Response: $body (HTTP $http_code)"

        - name: Send Plan Abandoned
          if: github.event_name == 'schedule' || github.event.inputs.notification_type == 'all' || github.event.inputs.notification_type == 'plan_abandoned'
          continue-on-error: true
          run: |
            echo "Sending plan_abandoned..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              '${{ env.SUPABASE_URL }}/functions/v1/send-daily-reminders' \
              -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
              -H 'Content-Type: application/json' \
              -d '{"type": "plan_abandoned"}')
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            echo "Response: $body (HTTP $http_code)"

        - name: Send Streak Lost
          if: github.event_name == 'schedule' || github.event.inputs.notification_type == 'all' || github.event.inputs.notification_type == 'streak_lost'   
          continue-on-error: true
          run: |
            echo "Sending streak_lost..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              '${{ env.SUPABASE_URL }}/functions/v1/send-daily-reminders' \
              -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
              -H 'Content-Type: application/json' \
              -d '{"type": "streak_lost"}')
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            echo "Response: $body (HTTP $http_code)"
